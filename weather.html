<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather + Study Timer</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark p-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Campus Life Super App</a>
    <div>
      <a href="events.html" class="btn btn-light btn-sm">Events</a>
      <a href="weather.html" class="btn btn-light btn-sm">Weather</a>
      <a href="dining.html" class="btn btn-light btn-sm">Dining</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <h2>Weather + Study Timer</h2>

  <input type="text" id="cityInput" placeholder="Enter city">
  <button id="getWeatherBtn" class="btn btn-primary">Get Weather</button>

  <div id="weatherResult" class="mt-3"></div>

  <hr>

  <h3>Study Timer</h3>

  <input type="number" id="studyMinutes" placeholder="Minutes">
  <button id="startTimerBtn" class="btn btn-success">Start Timer</button>

  <p id="timerDisplay"></p>
</div>

<script src="script.js"></script>
</body>
</html>
